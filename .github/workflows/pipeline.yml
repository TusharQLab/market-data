name: Indian Market Data Pipeline

on:
  schedule:
    # Runs at 17:00 UTC = 22:30 IST (after NSE close at 15:30 IST)
    - cron: "0 17 * * 1-5"   # Mon–Fri only

  # Also allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout your repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore previous data (from GitHub cache) ────────────────────────
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: market-data-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            market-data-${{ runner.os }}-

      # ── 5. Run pipeline ─────────────────────────────────────────────────────
      - name: Run data pipeline
        run: python pipeline.py

      # ── 6. Upload data files as artifacts (downloadable from GitHub UI) ─────
      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-data-${{ github.run_number }}
          path: |
            data/master_1m.csv
            data/master_5m.csv
            data/master_1h.csv
            data/backup_master_1m.csv
            data/validation_report.csv
          retention-days: 30

      # ── 7. Upload logs ───────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ── 8. Commit updated data back to repo (optional) ───────────────────────
      - name: Commit data files to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ || true
          git diff --cached --quiet || git commit -m "chore: auto-update market data $(date -u +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

